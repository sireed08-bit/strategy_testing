version: 1

# Multi-symbol switch/rotation strategies (portfolio engine v1: hold exactly one
# symbol at a time, or cash). Run via /run-portfolio against portfolio_etfs.csv.
portfolio_strategies:
  - family: risk_on_risk_off
    name: regime_switch_pair
    hypothesis: Hold the risk asset above its trend SMA, the safe asset below it — the strategy spy_tlt_regime_switch always promised but never delivered.
    rules:
      entry: risk close > SMA(trend_sma) -> hold risk_symbol; else hold safe_symbol
      exit: continuous switching
    parameter_grid:
      risk_symbol: [SPY, QQQ]
      safe_symbol: [TLT, IEF]
      trend_sma: [150, 200]

  - family: momentum
    name: relative_momentum_rotation
    hypothesis: At each rebalance, the strongest trailing return persists; cash when nothing is positive.
    rules:
      entry: hold argmax trailing return across the symbol set (if positive)
      exit: rebalance every rebalance_days
    parameter_grid:
      symbols: [[SPY, QQQ, IWM, DIA], [SPY, QQQ, TLT, GLD]]
      lookback: [63, 126]
      rebalance_days: [21]

  - family: risk_on_risk_off
    name: bond_low_risk_off
    hypothesis: A bond close at an N-day low (rates spiking) precedes equity weakness — step to cash. (YT catalog cross-asset signal, long-only translation.)
    rules:
      entry: hold equity_symbol unless bond close is the lowest of the last low_lookback days
      exit: risk-off to cash on bond low
    parameter_grid:
      equity_symbol: [SPY, QQQ]
      bond_symbol: [TLT]
      low_lookback: [30, 42]

strategies:
  - family: trend_following
    name: moving_average_cross
    hypothesis: Medium-term trend alignment can capture persistent equity moves.
    rules:
      entry: fast_sma crosses above slow_sma
      exit: fast_sma crosses below slow_sma
    parameter_grid:
      fast_sma: [10, 20, 50]
      slow_sma: [100, 150, 200]
    # stop_loss_pct now enforced by simulate_long_only — re-added as a real lever.
    # position_size_pct still omitted (inert until sizing is modelled).
    risk_grid:
      stop_loss_pct: [8, 12]
    constraints:
      - fast_sma_lt_slow_sma

  - family: mean_reversion
    name: rsi_pullback
    hypothesis: Oversold pullbacks in liquid index ETFs may mean-revert; trend filter may reduce drawdown.
    rules:
      entry: rsi below threshold and price above long_sma (if sma_filter > 0)
      exit: rsi recovers or max_hold_days reached
    parameter_grid:
      # entry_rsi/exit_rsi/sma_filter extended past 40/65/200 — the v4 promising
      # results on QQQ/IWM clustered on those grid boundaries, a sign the true
      # optimum lies beyond the original grid. New values add fresh combos only.
      rsi_period: [7, 10, 12, 14, 16, 21, 28]
      entry_rsi: [20, 25, 28, 30, 32, 35, 38, 40, 42, 45]
      exit_rsi: [50, 53, 55, 58, 60, 65, 70]
      sma_filter: [50, 100, 200, 250, 300]
    # position_size_pct dropped (inert until simulate_long_only scales by it).
    # max_hold_days, stop_loss_pct and vol_target_pct are all enforced. Single
    # probe values bound the grid blow-up; no 0 values — combos WITHOUT a key
    # are the baseline, adding 0 would duplicate them under new fingerprints.
    risk_grid:
      max_hold_days: [5, 10, 15]
      stop_loss_pct: [8]
      vol_target_pct: [15]

  - family: breakout
    name: donchian_breakout
    hypothesis: New highs after consolidation may continue in the breakout direction.
    rules:
      entry: close above entry_lookback-day channel high
      exit: close below exit_lookback-day channel low
    parameter_grid:
      entry_lookback: [20, 55, 100]
      exit_lookback: [10, 20, 40]
    # stop_loss_pct now enforced — re-added. position_size_pct still omitted.
    risk_grid:
      stop_loss_pct: [8, 12]
      vol_target_pct: [15]
    constraints:
      - exit_lookback_lt_entry_lookback

  - family: volatility
    name: volatility_contraction_expansion
    hypothesis: Breakouts following volatility contraction may offer better reward/risk.
    rules:
      entry: recent ATR contracts below prior ATR then price closes above recent range high
      exit: price falls below recent range low
    parameter_grid:
      contraction_days: [10, 20, 40]
      breakout_days: [5, 10, 20]
      atr_period: [10, 14, 20]
    # risk_grid omitted: position_size_pct is not yet enforced.

  - family: risk_on_risk_off
    name: spy_tlt_regime_switch
    hypothesis: Simple risk regime filters may reduce equity drawdowns.
    rules:
      entry: price above trend_sma-day moving average (risk on)
      exit: price below moving average (risk off, hold cash)
    parameter_grid:
      trend_sma: [100, 150, 200]
    # vol_target_pct probe: regime switching + vol targeting is the classic
    # low-drawdown pairing. position_size_pct still omitted (not enforced).
    risk_grid:
      vol_target_pct: [15]

  - family: momentum
    name: relative_strength_rotation
    hypothesis: Assets with positive trailing momentum may continue to lead.
    rules:
      entry: trailing return positive at rebalance interval
      exit: trailing return negative at rebalance interval
    parameter_grid:
      lookback_days: [63, 126, 252]
      rebalance_days: [21, 42, 63]
    # risk_grid omitted: position_size_pct is not yet enforced.

  - family: sector_rotation
    name: sector_momentum_leadership
    hypothesis: Sector leadership persistence can improve broad-market exposure timing.
    rules:
      entry: risk-adjusted trailing return positive at rebalance
      exit: risk-adjusted trailing return negative at rebalance
    parameter_grid:
      lookback_days: [63, 90, 126]
      rebalance_days: [21, 42, 63]
    # risk_grid omitted: position_size_pct is not yet enforced.

  # ── indicator-derived families (built from the scanner's top-IC signals) ──────
  - family: mean_reversion
    name: sma_reversion
    hypothesis: Price stretched far below its moving average tends to revert — built from the strongest clean scanner signal (dist_from_sma, negative IC growing with horizon).
    rules:
      entry: close falls entry_pct below the sma_window moving average
      exit: close reverts to within exit_pct of the average, or max_hold_days
    parameter_grid:
      sma_window: [20, 50, 100]
      entry_pct: [3, 5, 8, 10]
      exit_pct: [0, 1, 2]
    risk_grid:
      max_hold_days: [0, 10, 20]
      stop_loss_pct: [8]
      vol_target_pct: [15]

  - family: momentum
    name: gap_momentum
    hypothesis: Overnight up-gaps show short-term continuation — built from the scanner's positive gap_pct IC.
    rules:
      entry: overnight gap (open vs prior close) exceeds gap_pct
      exit: max_hold_days reached
    parameter_grid:
      gap_pct: [0.5, 1.0, 1.5, 2.0]
    risk_grid:
      max_hold_days: [2, 3, 5]
      stop_loss_pct: [5, 8]
      vol_target_pct: [15]

  # ── families mined from the YouTube-transcript strategy catalog ──────────────
  - family: mean_reversion
    name: bollinger_reversion
    hypothesis: A close snapping back above the lower Bollinger band marks a mean-reversion entry; exit at the upper band. (YT catalog / Kevin Davey, long-only translation.)
    rules:
      entry: close crosses from below the lower band back above it
      exit: close reaches the upper band, or max_hold_days
    parameter_grid:
      window: [15, 20, 25]
      num_std: [1.5, 2.0, 2.5]
    # Paired with the profit-target lever per Davey's exit study (targets beat stops).
    risk_grid:
      max_hold_days: [10, 20]
      profit_target_atr: [3]

  - family: momentum
    name: percent_rank_momentum
    hypothesis: A close ranking in the top decile-ish of its trailing window signals strength that persists. (YT catalog "Rolling Window Strength Bias".)
    rules:
      entry: close percent-rank over the trailing window >= entry_percentile
      exit: percent-rank <= exit_percentile, or max_hold_days
    parameter_grid:
      lookback: [20, 50, 100]
      entry_percentile: [70, 80, 90]
      exit_percentile: [20, 30, 50]
    risk_grid:
      max_hold_days: [5, 10, 20]

  - family: calendar
    name: day_of_week_momentum
    hypothesis: Specific weekdays carry exploitable drift when long-term momentum agrees. (YT catalog / Davey NQ day-of-week, daily translation.)
    rules:
      entry: it is the configured weekday AND close > close[momentum_lookback]
      exit: max_hold_days elapsed or momentum condition dies
    parameter_grid:
      weekday: [0, 1, 2, 3, 4]
      momentum_lookback: [100, 200]
    risk_grid:
      max_hold_days: [3, 5]

  - family: calendar
    name: turn_of_month
    hypothesis: The turn-of-month effect — equity returns cluster in the last and first few trading days of each month. (YT catalog / academic anomaly.)
    rules:
      entry: calendar day >= entry_day
      exit: calendar day > exit_day of the following month
    parameter_grid:
      entry_day: [24, 26, 28]
      exit_day: [3, 5]
    risk_grid:
      stop_loss_pct: [8]

  - family: calendar
    name: month_range_hold
    hypothesis: Seasonal month-span holding (Nov-Apr style) captures the favourable half of the year. (YT catalog / TrendSpider seasonal archetype.)
    rules:
      entry: month enters the configured window (wrap-around supported)
      exit: month leaves the window
    parameter_grid:
      start_month: [10, 11]
      end_month: [4, 5]
    risk_grid:
      stop_loss_pct: [8]

  - family: mean_reversion
    name: dual_momentum_band
    hypothesis: Within a long-term decline, a fast-lookback upturn against a still-falling slow lookback marks a rebound entry. (YT catalog / Davey's recurring momentum entry structure.)
    rules:
      entry: close < close[long_lookback] AND close > close[fast_lookback] AND close < close[slow_lookback]
      exit: long-term downtrend condition dies, max_hold_days, or the profit target
    parameter_grid:
      long_lookback: [200]
      fast_lookback: [5, 10, 20]
      slow_lookback: [40, 60]
    risk_grid:
      max_hold_days: [10, 21]
      profit_target_atr: [2, 3]
